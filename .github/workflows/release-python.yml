name: Publish Python Packages

on:
  release:
    types: [published]

jobs:
  publish-sdk:
    name: Upload SDK to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aerograph-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine uv
          
      - name: Build aerograph-sdk
        run: |
          cd python/aerograph-sdk
          python -m build
          
      - name: Publish aerograph-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/aerograph-sdk/dist/

  publish-langchain:
    name: Upload Langchain to PyPI
    runs-on: ubuntu-latest
    # No environment block here, so PyPI will accept it with a blank environment setting
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine uv
          
      - name: Build aerograph-langchain
        run: |
          cd python/aerograph-langchain
          python -m build
          
      - name: Publish aerograph-langchain to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/aerograph-langchain/dist/

  publish-otel:
    name: Upload OTel Bridge to PyPI
    runs-on: ubuntu-latest
    # No environment block here, so PyPI will accept it with a blank environment setting
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine uv
          
      - name: Build aerograph-otel
        run: |
          cd python/aerograph-otel
          python -m build
          
      - name: Publish aerograph-otel to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/aerograph-otel/dist/