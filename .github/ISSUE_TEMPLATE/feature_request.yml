name: Feature request
description: Propose a new capability, workflow, or improvement for AeroGraph.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template to describe a concrete product or workflow improvement.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user need or workflow gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: impact
    attributes:
      label: Replay, determinism, or schema impact
      description: Note whether this would add fields, change contracts, or affect deterministic behavior.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked whether this idea already exists in issues or docs.
          required: true
        - label: I described any compatibility or migration concerns.
          required: true